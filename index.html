<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Business Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <section class="profile">
      <img src="holiday.jpeg" alt="프로필 이미지" class="profile-img" />

      <h1>성민아</h1>
      <p class="job">3rd Year Game Designer</p>
    </section>

    <section class="intro">
      <p class="catchphrase">
        사용자를 끊임없이 분석하며 <span>Why</span>를 생각하는 기획자
      </p>

      <div class="key-points">
        <h2>Key Point</h2>
        <ol>
          <li>게임 콘텐츠 보상 및 재화 관련 시스템 개선 기획</li>
          <li>게임 이벤트 &amp; BM 기획</li>
          <li>게임 경제 데이터 분석 및 개선 방안 기획</li>
        </ol>
      </div>
    </section>

    <div class="divider"></div>

    <section class="contact">
      <div class="contact-row">
        <span class="label">Email</span>
        <span class="value" id="email">rinette9612@gmail.com</span>
        <button type="button" class="small-btn" id="copyEmailBtn">복사</button>
      </div>

      <div class="contact-row">
        <span class="label">Phone</span>
        <span class="value">010-8859-0506</span>
        <a href="tel:01088590506" class="small-btn call-btn">연결</a>
      </div>
    </section>

    <section class="link-buttons">
      <a href="https://github.com/Minah-Seong" target="_blank" class="main-btn">
        💻 Github
      </a>

      <a href="https://drive.google.com/drive/folders/1DOy1oLp1RlWFRvse1Yh1xKD27joImujr" target="_blank" class="main-btn">
        🗂️ Portfolio
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
