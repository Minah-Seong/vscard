<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 명함 카드</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <main class="business-card">

        <div class="profile-image">
            <img src="./holiday.jpeg" alt="프로필 이미지">
        </div>

        <h1 class="name">성민아</h1>

        <p class="job">3rd Year Game Designer</p>

        <div class="divider"></div>

        <section class="contact-list" aria-label="연락처">

            <div class="contact-item">
                <div class="contact-text">
                    <span class="contact-label">Email</span>

                    <span
                        class="contact-value"
                        id="emailText"
                    >
                        rinette9612@gmail.com
                    </span>
                </div>

                <button
                    class="contact-action"
                    type="button"
                    id="copyEmailButton"
                >
                    복사
                </button>
            </div>

            <div class="contact-item">
                <div class="contact-text">
                    <span class="contact-label">Phone</span>

                    <span class="contact-value">
                        010-8859-0506
                    </span>
                </div>

                <a
                    class="contact-action"
                    href="tel:01088590506"
                >
                    연결
                </a>
            </div>

        </section>

        <div class="button-group">

            <a
                class="card-button"
                href="https://github.com/Minah-Seong"
                target="_blank"
                rel="noopener noreferrer"
            >
                💻 Github
            </a>

            <a
                class="card-button"
                href="https://drive.google.com/drive/folders/1DOy1oLp1RlWFRvse1Yh1xKD27joImujr?usp=drive_link"
                target="_blank"
                rel="noopener noreferrer"
            >
                🗂️ Portfolio
            </a>

        </div>

    </main>

    <script src="./script.js"></script>

</body>
</html>
