<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹 명함 카드</title>

    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="business-card">
        <div class="profile-image">
            <img src="./cat1.jpg" alt="프로필 이미지" />
        </div>

        <h1 class="name">성민아</h1>

        <p class="job">Frontend & Backend Developer</p>

        <div class="divider"></div>

        <section class="contact-list" aria-label="연락처">
            <div class="contact-item">
                <span class="contact-label">Email</span>
                <a class="contact-link" href="mailto:hong@example.com">
                    hong@example.com
                </a>
            </div>

            <div class="contact-item">
                <span class="contact-label">Phone</span>
                <a class="contact-link" href="tel:01012345678">
                    010-1234-5678
                </a>
            </div>
        </section>

        <div class="footer">Digital Business Card</div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
